version: "3.8"

services:
  openrouter-image-proxy:
    image: python:3.14-slim
    restart: unless-stopped
    working_dir: /app
    environment:
      - OPENROUTER_URL=https://openrouter.ai/api/v1
      # "image,text" for Gemini-style models; "image" for Flux / Sourceful.
      - DEFAULT_MODALITIES=image,text
      - UPSTREAM_TIMEOUT=120
      - LOG_LEVEL=INFO
    command: >
      bash -c 'pip install --no-cache-dir -r requirements.txt &&
      uvicorn openrouter_image_proxy:app --host 0.0.0.0 --port 8080'
    volumes:
      - ./openrouter_image_proxy.py:/app/openrouter_image_proxy.py:ro
      - ./requirements.txt:/app/requirements.txt:ro
    networks:
      - my_network

  # ── Example: Open WebUI in the same network ──────────────────────────
  # open-webui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   networks:
  #     - my_network

networks:
  my_network:
